name: Release
on: {push: {branches: [development], tags: [v*.*.*]}, pull_request: {branches: [development]}}
jobs:
  wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # macos-15-intel is the Intel runner (replaces retired macos-13); macos-latest is Apple Silicon
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-15-intel, macos-latest]
    steps:
    - uses: actions/checkout@v4
      with: {fetch-depth: 0, submodules: false}
    - uses: pypa/cibuildwheel@2.x
      with: {output-dir: dist}
    - uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}-${{ strategy.job-index }}
        path: ./dist/*.whl
  pypi:
    needs: wheels
    permissions: {id-token: write}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with: {fetch-depth: 0, submodules: false}
    - uses: actions/setup-python@v5
      with: {python-version: '3.x'}
    - uses: actions/download-artifact@v4
      with:
        pattern: wheels-*
        path: dist
        merge-multiple: true
    - run: pipx run twine check --strict dist/*
    - uses: casperdcl/deploy-pypi@v2
      with:
        build: -s
        upload: ${{ startsWith(github.ref, 'refs/tags/v') }}
